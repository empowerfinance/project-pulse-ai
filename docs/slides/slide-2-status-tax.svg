<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="The status tax — hierarchy pyramid">
  <defs>
    <style>
      .tag  { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: 0.14em; fill: #1A1A1A; }
      .row  { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: 0.14em; fill: #1A1A1A; }
      .num  { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-weight: 900; fill: #1A1A1A; letter-spacing: -0.03em; }
      .unit { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-weight: 600; letter-spacing: 0.04em; fill: #6B6760; }
      .sub  { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-style: italic; fill: #6B6760; }
      .cap  { font-family: Inter, -apple-system, Helvetica, Arial, sans-serif; font-style: italic; fill: #1A1A1A; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#F1ECE0"/>

  <!-- Pill tag -->
  <rect x="60" y="60" rx="22" ry="22" width="230" height="44" fill="#C6E812"/>
  <text x="175" y="89" class="tag" font-size="16" text-anchor="middle">THE STATUS TAX</text>
  <text x="60" y="132" class="sub" font-size="15">A slice of Tilt · 2 BUs · 4 pods · 32 initiatives</text>

  <!-- Row labels (left) -->
  <g class="row" font-size="14">
    <text x="50" y="246">COMPANY ×1</text>
    <text x="50" y="406">BUs ×2</text>
    <text x="50" y="566">PODS ×4</text>
    <text x="50" y="726">INITIATIVES ×32</text>
  </g>

  <!-- Edges: initiatives → pods (32 lines) -->
  <g stroke="#8A857B" stroke-width="0.8" opacity="0.35">
    <line x1="210" y1="720" x2="290.5" y2="560"/>
    <line x1="233" y1="720" x2="290.5" y2="560"/>
    <line x1="256" y1="720" x2="290.5" y2="560"/>
    <line x1="279" y1="720" x2="290.5" y2="560"/>
    <line x1="302" y1="720" x2="290.5" y2="560"/>
    <line x1="325" y1="720" x2="290.5" y2="560"/>
    <line x1="348" y1="720" x2="290.5" y2="560"/>
    <line x1="371" y1="720" x2="290.5" y2="560"/>
    <line x1="394" y1="720" x2="474.5" y2="560"/>
    <line x1="417" y1="720" x2="474.5" y2="560"/>
    <line x1="440" y1="720" x2="474.5" y2="560"/>
    <line x1="463" y1="720" x2="474.5" y2="560"/>
    <line x1="486" y1="720" x2="474.5" y2="560"/>
    <line x1="509" y1="720" x2="474.5" y2="560"/>
    <line x1="532" y1="720" x2="474.5" y2="560"/>
    <line x1="555" y1="720" x2="474.5" y2="560"/>
    <line x1="578" y1="720" x2="658.5" y2="560"/>
    <line x1="601" y1="720" x2="658.5" y2="560"/>
    <line x1="624" y1="720" x2="658.5" y2="560"/>
    <line x1="647" y1="720" x2="658.5" y2="560"/>
    <line x1="670" y1="720" x2="658.5" y2="560"/>
    <line x1="693" y1="720" x2="658.5" y2="560"/>
    <line x1="716" y1="720" x2="658.5" y2="560"/>
    <line x1="739" y1="720" x2="658.5" y2="560"/>
    <line x1="762" y1="720" x2="842.5" y2="560"/>
    <line x1="785" y1="720" x2="842.5" y2="560"/>
    <line x1="808" y1="720" x2="842.5" y2="560"/>
    <line x1="831" y1="720" x2="842.5" y2="560"/>
    <line x1="854" y1="720" x2="842.5" y2="560"/>
    <line x1="877" y1="720" x2="842.5" y2="560"/>
    <line x1="900" y1="720" x2="842.5" y2="560"/>
    <line x1="923" y1="720" x2="842.5" y2="560"/>
  </g>

  <!-- Edges: pods → BUs -->
  <g stroke="#8A857B" stroke-width="1.2" opacity="0.55">
    <line x1="290.5" y1="560" x2="382.5" y2="400"/>
    <line x1="474.5" y1="560" x2="382.5" y2="400"/>
    <line x1="658.5" y1="560" x2="750.5" y2="400"/>
    <line x1="842.5" y1="560" x2="750.5" y2="400"/>
  </g>

  <!-- Edges: BUs → Company -->
  <g stroke="#8A857B" stroke-width="1.6" opacity="0.75">
    <line x1="382.5" y1="400" x2="566.5" y2="240"/>
    <line x1="750.5" y1="400" x2="566.5" y2="240"/>
  </g>

  <!-- Nodes: 32 initiatives -->
  <g fill="#3A362F">
    <circle cx="210" cy="720" r="4"/><circle cx="233" cy="720" r="4"/><circle cx="256" cy="720" r="4"/><circle cx="279" cy="720" r="4"/>
    <circle cx="302" cy="720" r="4"/><circle cx="325" cy="720" r="4"/><circle cx="348" cy="720" r="4"/><circle cx="371" cy="720" r="4"/>
    <circle cx="394" cy="720" r="4"/><circle cx="417" cy="720" r="4"/><circle cx="440" cy="720" r="4"/><circle cx="463" cy="720" r="4"/>
    <circle cx="486" cy="720" r="4"/><circle cx="509" cy="720" r="4"/><circle cx="532" cy="720" r="4"/><circle cx="555" cy="720" r="4"/>
    <circle cx="578" cy="720" r="4"/><circle cx="601" cy="720" r="4"/><circle cx="624" cy="720" r="4"/><circle cx="647" cy="720" r="4"/>
    <circle cx="670" cy="720" r="4"/><circle cx="693" cy="720" r="4"/><circle cx="716" cy="720" r="4"/><circle cx="739" cy="720" r="4"/>
    <circle cx="762" cy="720" r="4"/><circle cx="785" cy="720" r="4"/><circle cx="808" cy="720" r="4"/><circle cx="831" cy="720" r="4"/>
    <circle cx="854" cy="720" r="4"/><circle cx="877" cy="720" r="4"/><circle cx="900" cy="720" r="4"/><circle cx="923" cy="720" r="4"/>
  </g>

  <!-- Nodes: 4 pods -->
  <g fill="#2E2A24">
    <circle cx="290.5" cy="560" r="11"/>
    <circle cx="474.5" cy="560" r="11"/>
    <circle cx="658.5" cy="560" r="11"/>
    <circle cx="842.5" cy="560" r="11"/>
  </g>

  <!-- Nodes: 2 BUs -->
  <g fill="#201D19">
    <circle cx="382.5" cy="400" r="18"/>
    <circle cx="750.5" cy="400" r="18"/>
  </g>

  <!-- Node: 1 company -->
  <circle cx="566.5" cy="240" r="28" fill="#1A1A1A"/>

  <!-- Right side: total -->
  <text x="1260" y="470" class="num" font-size="240" text-anchor="middle">~50</text>
  <text x="1260" y="525" class="unit" font-size="34" text-anchor="middle">HRS / MONTH</text>
  <text x="1260" y="580" class="sub" font-size="22" text-anchor="middle">a full work week, every month</text>

  <!-- Bottom caption -->
  <text x="800" y="845" class="cap" font-size="22" text-anchor="middle">
    At every level, a human reads the level below and writes for the level above.
  </text>
</svg>
